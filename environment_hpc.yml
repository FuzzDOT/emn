name: emn
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # PyTorch with CUDA 11.8 (NCSU Henry2 default)
  - pytorch>=2.0.0
  - torchvision>=0.15.0
  - pytorch-cuda=11.8

  # Core scientific
  - numpy>=1.24
  - scipy>=1.11
  - pandas>=2.0
  - matplotlib>=3.7
  - seaborn>=0.13
  - scikit-learn>=1.3

  # System
  - psutil
  - pyyaml>=6.0

  - pip:
    - transformers>=4.38.0
    - accelerate>=0.28.0
    - datasets>=2.17.0
    - sentence-transformers>=2.6.0
    - pydantic>=2.0.0
    - anthropic>=0.25.0
    - tqdm>=4.66.0
    - faiss-cpu>=1.7.4
    - avalanche-lib>=0.4.0
    - hydra-core>=1.3.2
    - omegaconf>=2.3.0
    - wandb>=0.16.0
    - pytest>=8.0.0
    - pytest-cov>=4.0.0
    - -e .
