[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    --strict-markers
    -q
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    gpu: marks tests that require CUDA
    faiss: marks tests that require faiss
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
